version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules # لمنع الكتابة فوق الـ modules المحلية
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: sh -c "npx prisma generate && npx prisma db push && npm run start:dev"
    depends_on:
      - redis_server
    
  redis_server: 
    image: redis:alpine
    container_name: redis-dev
    ports:
      - "6379:6379"